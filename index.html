<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS VJP POS — Hệ Thống Quản Lý</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ── DARK THEME (default) ── */
:root,[data-theme="dark"]{
  --bg:#0f1117;--bg2:#161b22;--bg3:#1c2230;--bg4:#222d3d;
  --border:#2a3447;--border2:#3a4a62;
  --text:#e8edf5;--text2:#8fa3bc;--text3:#5a7090;
  --primary:#3b82f6;--primary2:#2563eb;--primary-glow:rgba(59,130,246,.18);
  --green:#22c55e;--green2:#16a34a;--green-bg:rgba(34,197,94,.1);
  --red:#ef4444;--red2:#dc2626;--red-bg:rgba(239,68,68,.1);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.1);
  --teal:#14b8a6;--teal-bg:rgba(20,184,166,.1);
  --radius:8px;--radius2:12px;--radius3:16px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --font:'Be Vietnam Pro',sans-serif;--mono:'JetBrains Mono',monospace;
}
/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f8f9fb;--bg4:#edf0f4;
  --border:#dde1e8;--border2:#c8cdd8;
  --text:#1a2030;--text2:#4a5568;--text3:#8a94a6;
  --primary:#2563eb;--primary2:#1d4ed8;--primary-glow:rgba(37,99,235,.12);
  --green:#16a34a;--green2:#15803d;--green-bg:rgba(22,163,74,.1);
  --red:#dc2626;--red2:#b91c1c;--red-bg:rgba(220,38,38,.08);
  --amber:#d97706;--amber-bg:rgba(217,119,6,.1);
  --purple:#7c3aed;--purple-bg:rgba(124,58,237,.1);
  --teal:#0d9488;--teal-bg:rgba(13,148,136,.1);
  --shadow:0 4px 24px rgba(0,0,0,.12);
}
[data-theme="light"] .invoice-print{background:#f5f5f5;color:#222}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:200;transition:left .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.3)}
  .sidebar.open{left:0}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
  .sidebar-overlay.show{display:block}
  .main{width:100vw}
  .topbar{padding:0 12px;gap:8px}
  .topbar-search{display:none}
  .topbar-btn.secondary{display:none}
  .hamburger{display:flex!important}
  .content{padding:12px}
  .grid-4{grid-template-columns:repeat(2,1fr);gap:10px}
  .grid-3{grid-template-columns:repeat(2,1fr);gap:10px}
  .grid-2{grid-template-columns:1fr;gap:10px}
  .pos-layout{flex-direction:column;height:auto}
  .pos-right{width:100%;min-width:unset;border-left:none;border-top:1px solid var(--border)}
  .pos-left{max-height:55vh;overflow-y:auto}
  .items-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
  .item-card .ic-img{width:44px;height:44px;font-size:22px}
  .modal{width:95vw!important;max-height:92vh}
  .form-row{grid-template-columns:1fr}
  .form-row.col3{grid-template-columns:1fr}
  .sidebar-bottom .user-info{display:none}
  .pay-btns{flex-wrap:wrap}
  table{font-size:12px}
  tbody td{padding:8px 8px}
  .stat-card .sc-val{font-size:18px}
  .topbar-title{font-size:13px}
}
@media(min-width:769px){
  .hamburger{display:none!important}
  .sidebar-overlay{display:none!important}
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sidebar-logo .logo-text{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.sidebar-logo .logo-sub{font-size:10px;color:var(--text3);font-weight:400}
.nav{flex:1;overflow-y:auto;padding:8px}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:12px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;text-decoration:none}
.nav-item:hover{background:var(--bg4);color:var(--text)}
.nav-item.active{background:var(--primary-glow);color:var(--primary);border:1px solid rgba(59,130,246,.25)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-family:var(--mono)}
.sidebar-bottom{padding:12px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:var(--radius2);cursor:pointer}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-info .uname{font-size:12px;font-weight:600}
.user-info .urole{font-size:10px;color:var(--text3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;flex:1}
.topbar-search{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;width:260px}
.topbar-search input{background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--font);width:100%}
.topbar-search input::placeholder{color:var(--text3)}
.topbar-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:all .15s}
.topbar-btn:hover{background:var(--primary2);transform:translateY(-1px)}
.topbar-btn.secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.topbar-btn.secondary:hover{background:var(--bg4);color:var(--text)}
.content{flex:1;overflow-y:auto;padding:20px}

/* CARDS */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.08}
.stat-card.blue::before{background:var(--primary)}
.stat-card.green::before{background:var(--green)}
.stat-card.amber::before{background:var(--amber)}
.stat-card.red::before{background:var(--red)}
.stat-card .sc-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-card .sc-val{font-size:22px;font-weight:700;color:var(--text);font-family:var(--mono);line-height:1}
.stat-card .sc-sub{font-size:11px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:4px}
.stat-card .sc-icon{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px}
.stat-card.blue .sc-icon{background:var(--primary-glow);color:var(--primary)}
.stat-card.green .sc-icon{background:var(--green-bg);color:var(--green)}
.stat-card.amber .sc-icon{background:var(--amber-bg);color:var(--amber)}
.stat-card.red .sc-icon{background:var(--red-bg);color:var(--red)}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:10px 12px;font-size:13px;color:var(--text2);white-space:nowrap}
tbody td .name{color:var(--text);font-weight:500}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag.green{background:var(--green-bg);color:var(--green)}
.tag.red{background:var(--red-bg);color:var(--red)}
.tag.amber{background:var(--amber-bg);color:var(--amber)}
.tag.blue{background:var(--primary-glow);color:var(--primary)}
.tag.purple{background:var(--purple-bg);color:var(--purple)}
.tag.teal{background:var(--teal-bg);color:var(--teal)}

/* FORMS */
.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px}
.form-row.col3{grid-template-columns:repeat(3,1fr)}
.form-row.col1{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;height:80px}
.form-group select option{background:var(--bg3)}

/* POS LAYOUT */
.pos-layout{display:flex;height:100%;gap:0}
.pos-left{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.pos-right{width:340px;min-width:320px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column}

/* MENU GRID */
.menu-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cat-pill{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.cat-pill:hover{border-color:var(--border2);color:var(--text)}
.cat-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.item-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius2);padding:12px 10px;cursor:pointer;transition:all .15s;text-align:center;position:relative;user-select:none}
.item-card:hover{border-color:var(--primary);background:var(--bg4);transform:translateY(-2px)}
.item-card:active{transform:scale(.97)}
.item-card .ic-img{width:56px;height:56px;border-radius:10px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--bg4)}
.item-card .ic-img img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.item-card .ic-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px}
.item-card .ic-price{font-size:12px;color:var(--primary);font-family:var(--mono);font-weight:600}
.item-card .ic-cat{font-size:10px;color:var(--text3);margin-top:3px}
.item-card .stock-badge{position:absolute;top:6px;right:6px;font-size:10px;padding:1px 5px;border-radius:4px}
.item-card .qty-in-cart{position:absolute;top:-6px;left:-6px;width:20px;height:20px;background:var(--primary);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;display:none}

/* CART */
.cart-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-header h3{font-size:14px;font-weight:700}
.cart-items{flex:1;overflow-y:auto;padding:8px}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:var(--radius);margin-bottom:6px;border:1px solid var(--border)}
.cart-item .ci-icon{font-size:20px;flex-shrink:0}
.cart-item .ci-info{flex:1;min-width:0}
.cart-item .ci-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item .ci-price{font-size:11px;color:var(--primary);font-family:var(--mono)}
.qty-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.qbtn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);background:var(--bg4);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:var(--mono)}
.qbtn:hover{background:var(--primary);border-color:var(--primary);color:#fff}
.qnum{width:26px;text-align:center;font-size:13px;font-weight:700;font-family:var(--mono);color:var(--text)}
.ci-total{font-size:12px;font-weight:700;color:var(--text);font-family:var(--mono);min-width:60px;text-align:right}
.cart-footer{padding:12px 14px;border-top:1px solid var(--border)}
.cart-customer{display:flex;gap:6px;margin-bottom:8px}
.cart-customer input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;color:var(--text);font-size:12px;font-family:var(--font);outline:none}
.cart-customer button{padding:7px 12px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:12px}
.cart-customer button:hover{border-color:var(--primary);color:var(--primary)}
.cart-line{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:5px}
.cart-line .cl-label{color:var(--text2)}
.cart-line .cl-val{font-family:var(--mono);font-weight:600}
.cart-total-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:6px 0}
.cart-total-line .ct-label{font-size:13px;font-weight:700}
.cart-total-line .ct-val{font-size:18px;font-weight:700;color:var(--primary);font-family:var(--mono)}
.pay-btns{display:flex;gap:6px;margin-top:8px}
.pay-btn{flex:1;padding:10px 8px;border-radius:var(--radius);border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.pay-btn.cash{background:var(--green);color:#fff}
.pay-btn.cash:hover{background:var(--green2)}
.pay-btn.card{background:var(--primary);color:#fff}
.pay-btn.card:hover{background:var(--primary2)}
.pay-btn.cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.pay-btn.cancel:hover{border-color:var(--red);color:var(--red)}
.disc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.disc-row label{font-size:11px;color:var(--text3);white-space:nowrap}
.disc-row input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;color:var(--text);font-size:12px;font-family:var(--mono);text-align:center;outline:none;width:60px}
.note-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;resize:none;height:44px;margin-bottom:6px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius3);padding:24px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal.wide{width:760px}
.modal.sm{width:400px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* INVOICE PRINT */
.invoice-print{font-family:var(--mono);font-size:12px;line-height:1.8;background:var(--bg3);border-radius:var(--radius);padding:16px;margin:12px 0;white-space:pre;overflow-x:auto;color:var(--text)}

/* LOYALTY CARD */
.loyalty-card{background:linear-gradient(135deg,#1e3a5f,#0f2744);border:1px solid rgba(59,130,246,.3);border-radius:var(--radius3);padding:18px;position:relative;overflow:hidden}
.loyalty-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(59,130,246,.2),transparent);border-radius:50%}
.loyalty-dots{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.ldot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(59,130,246,.3);background:transparent;transition:all .2s}
.ldot.filled{background:var(--primary);border-color:var(--primary);box-shadow:0 0 8px rgba(59,130,246,.4)}
.lc-name{font-size:15px;font-weight:700;margin-bottom:2px}
.lc-phone{font-size:12px;color:#6b9fd4}
.lc-pts{font-size:28px;font-weight:700;font-family:var(--mono);color:var(--primary)}

/* PAGINATION */
.pagination{display:flex;align-items:center;gap:6px;margin-top:14px;justify-content:center}
.page-btn{padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;transition:all .15s}
.page-btn:hover{border-color:var(--primary);color:var(--primary)}
.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* CHART */
.chart-wrap{position:relative;height:240px}

/* TOAST */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 16px;border-radius:var(--radius2);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;animation:slideIn .2s ease;box-shadow:var(--shadow);max-width:300px}
.toast.success{background:#052e16;border:1px solid var(--green2);color:var(--green)}
.toast.error{background:#450a0a;border:1px solid var(--red2);color:var(--red)}
.toast.info{background:#0c1a33;border:1px solid var(--primary2);color:var(--primary)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{transform:translateX(110%);opacity:0}}

/* MISC */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-header h3{font-size:14px;font-weight:700}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state .es-icon{font-size:40px;margin-bottom:10px}
.empty-state p{font-size:13px}
.badge-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.progress-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
.trend-up{color:var(--green)}
.trend-down{color:var(--red)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg4);color:var(--text2)}
.divider{height:1px;background:var(--border);margin:14px 0}
.img-upload-area{border:2px dashed var(--border2);border-radius:var(--radius2);padding:20px;text-align:center;cursor:pointer;transition:border .15s}
.img-upload-area:hover{border-color:var(--primary)}
.img-upload-area input{display:none}

<script>
// ===================== DATABASE =====================
let db;
const SQL_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.wasm';

// ── IndexedDB helpers (không giới hạn dung lượng, không bị lỗi buffer lớn) ──
const IDB_NAME = 'vjp_pos_db', IDB_STORE = 'db_binary', IDB_KEY = 'main';

function idbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e);
  });
}

async function idbLoad() {
  const idb = await idbOpen();
  return new Promise((res, rej) => {
    const tx = idb.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(IDB_KEY);
    req.onsuccess = e => res(e.target.result || null);
    req.onerror = e => rej(e);
  });
}

async function idbSave(buf) {
  const idb = await idbOpen();
  return new Promise((res, rej) => {
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).put(buf, IDB_KEY);
    req.onsuccess = () => res();
    req.onerror = e => rej(e);
  });
}

async function idbClear() {
  const idb = await idbOpen();
  return new Promise((res, rej) => {
    const tx = idb.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(IDB_KEY);
    tx.oncomplete = () => res();
    tx.onerror = e => rej(e);
  });
}
// ──────────────────────────────────────────────────────────────────────────────

let _saveTimer = null;
function saveDB() {
  // debounce: gom nhiều run() liên tiếp thành 1 lần ghi
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    try {
      const buf = db.export();           // Uint8Array
      await idbSave(buf);
      // hiện chỉ thị lưu nhỏ
      const ind = document.getElementById('save-indicator');
      if (ind) { ind.style.opacity='1'; setTimeout(()=>ind.style.opacity='0',1200); }
    } catch(e) { console.error('saveDB error:', e); }
  }, 300);
}

async function initDB() {
  // Hiển thị màn hình loading
  document.getElementById('content-area').innerHTML =
    `<div class="empty-state" style="padding:60px 0">
       <div class="es-icon" style="font-size:48px">⏳</div>
       <p style="font-size:15px;margin-top:8px">Đang khởi động cơ sở dữ liệu...</p>
       <p style="font-size:12px;color:var(--text3);margin-top:6px">Vui lòng chờ một chút</p>
     </div>`;

  const SQL = await initSqlJs({
    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}`
  });

  const saved = await idbLoad();   // Uint8Array hoặc null
  if (saved && saved.byteLength > 0) {
    db = new SQL.Database(saved);
    // Kiểm tra schema còn đủ không (trường hợp version cũ)
    try { db.exec('SELECT id FROM products LIMIT 1'); }
    catch { db = new SQL.Database(); createSchema(); seedData(); }
  } else {
    // Thử migrate từ localStorage cũ nếu có
    const legacy = localStorage.getItem('vjp_pos_v2');
    if (legacy) {
      try {
        // Dùng cách decode an toàn, không spread
        const binStr = atob(legacy);
        const buf = new Uint8Array(binStr.length);
        for (let i = 0; i < binStr.length; i++) buf[i] = binStr.charCodeAt(i);
        db = new SQL.Database(buf);
        localStorage.removeItem('vjp_pos_v2'); // xóa bản cũ
        await idbSave(db.export());
        toast('✅ Đã chuyển dữ liệu cũ sang IndexedDB!', 'success');
      } catch {
        db = new SQL.Database(); createSchema(); seedData();
      }
    } else {
      db = new SQL.Database(); createSchema(); seedData();
    }
  }
  renderDashboard();
}

function query(sql, params = []) {
  try {
    const res = db.exec(sql, params);
    if (!res.length) return [];
    return res[0].values.map(row => {
      const obj = {};
      res[0].columns.forEach((c, i) => obj[c] = row[i]);
      return obj;
    });
  } catch(e) { console.error(e); return []; }
}

async function saveDBNow() {
  if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }
  try {
    const buf = db.export();
    await idbSave(buf);
    const ind = document.getElementById('save-indicator');
    if (ind) { ind.style.opacity='1'; setTimeout(()=>ind.style.opacity='0',1200); }
  } catch(e) { console.error('saveDBNow error:', e); }
}

function run(sql, params = []) {
  try { db.run(sql, params); saveDB(); return true; }
  catch(e) { console.error(e); return false; }
}

  db.run(`INSERT OR IGNORE INTO settings VALUES ('tax_pct','0')`);
  db.run(`INSERT OR IGNORE INTO settings VALUES ('points_per_vnd','10000')`);

  db.run(`INSERT OR IGNORE INTO settings VALUES ('discount_per_10pts','5')`);

      const items = query(`SELECT id,name,price,cost FROM products WHERE id IN (${prodIds.join(',')})`);
      let sub=0;
      const itemData = items.map(p=>{const q=1+Math.floor(Math.random()*2);sub+=p.price*q;return{...p,qty:q,total:p.price*q};});
      const disc=Math.random()<.1?5:0;
      const total=sub*(1-disc/100);
      const custId=Math.random()<.4?Math.ceil(Math.random()*5):null;
      const pts=Math.floor(total/10000);
      const ts=`${dateStr} ${String(6+Math.floor(Math.random()*4)).padStart(2,'0')}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}:00`;
      db.run(`INSERT INTO orders(order_code,customer_id,subtotal,discount_pct,discount_amt,total,points_earned,payment_method,status,created_at) VALUES (?,?,?,?,?,?,?,?,?,?)`,
        [`HD${codeNum}`,custId,sub,disc,sub*disc/100,total,pts,methods[Math.floor(Math.random()*3)],'completed',ts]);
      const oid=db.exec('SELECT last_insert_rowid() as id')[0].values[0][0];
      itemData.forEach(it=>db.run(`INSERT INTO order_items(order_id,product_id,product_name,price,cost,qty,total) VALUES (?,?,?,?,?,?,?)`,
        [oid,it.id,it.name,it.price,it.cost,it.qty,it.total]));
      orderSeq++;
    }
  }
  db.run(`INSERT INTO expenses(title,category,amount,expense_date,note) VALUES
    ('Mua nguyên liệu phở','Nguyên liệu',850000,date('now','-1 day'),'Xương, thịt bò, gia vị'),
    ('Tiền thuê mặt bằng','Cố định',3000000,date('now','-5 day'),'Tháng này'),
    ('Điện nước','Cố định',450000,date('now','-3 day'),''),
    ('Lương nhân viên','Nhân công',4500000,date('now','-7 day'),'2 người'),
    ('Mua rau củ','Nguyên liệu',280000,date('now'),'Rau thơm, hành, ngò'),
    ('Gas','Tiện ích',320000,date('now','-2 day'),'')`);
  saveDB();
}

}

// ===================== DASHBOARD =====================
function renderDashboard() {
  const today = new Date().toISOString().slice(0,10);
  const stats = query(`SELECT 
    COUNT(*) as orders,
    COALESCE(SUM(total),0) as revenue,
    COALESCE(AVG(total),0) as avg_order,
    COALESCE(SUM(points_earned),0) as points
    FROM orders WHERE date(created_at)=? AND status='completed'`,[today])[0];
  const yesterday = new Date();yesterday.setDate(yesterday.getDate()-1);
  const yd=yesterday.toISOString().slice(0,10);
  const ydStats = query(`SELECT COALESCE(SUM(total),0) as revenue,COUNT(*) as orders FROM orders WHERE date(created_at)=? AND status='completed'`,[yd])[0];
  const topItems = query(`SELECT p.name,p.image,SUM(oi.qty) as sold,SUM(oi.total) as rev FROM order_items oi JOIN products p ON p.id=oi.product_id JOIN orders o ON o.id=oi.order_id WHERE date(o.created_at)=? AND o.status='completed' GROUP BY oi.product_id ORDER BY sold DESC LIMIT 5`,[today]);
  const weekRevenue = query(`SELECT date(created_at) as day,SUM(total) as rev,COUNT(*) as cnt FROM orders WHERE date(created_at)>=date('now','-6 days') AND status='completed' GROUP BY day ORDER BY day`);
  const lowStock = query(`SELECT * FROM products WHERE stock<=min_stock AND is_active=1 ORDER BY stock ASC LIMIT 5`);
  const expenses_today = query(`SELECT COALESCE(SUM(amount),0) as total FROM expenses WHERE expense_date=?`,[today])[0];
  const profit = (stats.revenue||0) - (expenses_today.total||0);

  const revGrowth = ydStats.revenue>0 ? (((stats.revenue-ydStats.revenue)/ydStats.revenue)*100).toFixed(1) : 0;
  const ordGrowth = ydStats.orders>0 ? (((stats.orders-ydStats.orders)/ydStats.orders)*100).toFixed(1) : 0;

  const recentOrders = query(`SELECT o.*,COALESCE(c.name,'Khách lẻ') as cust_name FROM orders o LEFT JOIN customers c ON c.id=o.customer_id WHERE date(o.created_at)=? ORDER BY o.id DESC LIMIT 8`,[today]);

  document.getElementById('content-area').innerHTML = `
  <div class="grid-4">
    <div class="stat-card blue">
      <div class="sc-icon">💰</div>
      <div class="sc-label">Doanh thu hôm nay</div>
      <div class="sc-val">${fmtK(stats.revenue)}</div>
      <div class="sc-sub ${revGrowth>=0?'trend-up':'trend-down'}">${revGrowth>=0?'▲':'▼'} ${Math.abs(revGrowth)}% so với hôm qua</div>
    </div>
    <div class="stat-card green">
      <div class="sc-icon">🧾</div>
      <div class="sc-label">Số đơn hàng</div>
      <div class="sc-val">${stats.orders}</div>
      <div class="sc-sub ${ordGrowth>=0?'trend-up':'trend-down'}">${ordGrowth>=0?'▲':'▼'} ${Math.abs(ordGrowth)}% so với hôm qua</div>
    </div>
    <div class="stat-card amber">
      <div class="sc-icon">📊</div>
      <div class="sc-label">Trung bình / đơn</div>
      <div class="sc-val">${fmtK(stats.avg_order)}</div>
      <div class="sc-sub" style="color:var(--text3)">Hôm qua: ${fmtK(ydStats.revenue/(ydStats.orders||1))}</div>
    </div>
    <div class="stat-card ${profit>=0?'green':'red'}">
      <div class="sc-icon">📈</div>
      <div class="sc-label">Lợi nhuận tạm tính</div>
      <div class="sc-val">${fmtK(profit)}</div>
      <div class="sc-sub" style="color:var(--text3)">Chi phí: ${fmtK(expenses_today.total)}</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="section-header"><h3>📈 Doanh thu 7 ngày</h3></div>
      <div class="chart-wrap"><canvas id="weekChart"></canvas></div>
    </div>
    <div class="card">
      <div class="section-header"><h3>🔥 Top món bán chạy hôm nay</h3></div>
      ${topItems.length ? topItems.map((t,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="width:22px;height:22px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${i===0?'var(--amber)':i===1?'var(--text2)':'var(--text3)'};flex-shrink:0">${i+1}</span>
          <span style="font-size:18px">${t.image||'🍽️'}</span>
          <span style="flex:1;font-size:13px;font-weight:500;color:var(--text)">${t.name}</span>
          <span style="font-size:12px;color:var(--text2);font-family:var(--mono)">${t.sold} phần</span>
          <span style="font-size:12px;font-weight:700;color:var(--primary);font-family:var(--mono)">${fmtVnd(t.rev)}</span>
        </div>`).join('')
      : '<div class="empty-state"><div class="es-icon">🍽️</div><p>Chưa có đơn hàng hôm nay</p></div>'}
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="section-header"><h3>🕐 Đơn hàng gần đây</h3><button class="btn sm" onclick="showPage('orders')">Xem tất cả</button></div>
      ${recentOrders.length ? `
      <div class="table-wrap"><table>
        <thead><tr><th>Mã đơn</th><th>Khách</th><th>Tổng tiền</th><th>TT</th><th>Giờ</th></tr></thead>
        <tbody>${recentOrders.map(o=>`
          <tr onclick="showOrderDetail(${o.id})">
            <td><span class="name" style="font-family:var(--mono)">${o.order_code}</span></td>
            <td>${o.cust_name}</td>
            <td style="font-family:var(--mono);color:var(--primary)">${fmtVnd(o.total)}</td>
            <td><span class="tag green">Xong</span></td>
            <td style="color:var(--text3)">${o.created_at.slice(11,16)}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>` : '<div class="empty-state"><p>Chưa có đơn nào hôm nay</p></div>'}
    </div>
    <div class="card">
      <div class="section-header"><h3>⚠️ Hàng sắp hết kho</h3></div>
      ${lowStock.length ? lowStock.map(p=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:20px">${p.image||'📦'}</span>
          <div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text)">${p.name}</div>
          <div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:${Math.min(100,(p.stock/p.min_stock)*100)}%;background:${p.stock<=2?'var(--red)':'var(--amber)'}"></div></div></div>
          <span class="tag ${p.stock<=2?'red':'amber'}">${p.stock} còn</span>
        </div>`).join('')
      : '<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px">✅ Hàng hóa đủ kho</div>'}
    </div>
  </div>`;

  // Chart
  setTimeout(()=>{
    const labels=[];const data=[];
    for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);labels.push(d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'}));data.push(0);}
    weekRevenue.forEach(r=>{
      const d=new Date(r.day);const diff=Math.round((new Date(today)-d)/(86400000));
      if(diff>=0&&diff<=6) data[6-diff]=r.rev;
    });
    const ctx=document.getElementById('weekChart');
    if(ctx) new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'Doanh thu',data,backgroundColor:'rgba(59,130,246,.6)',borderColor:'rgba(59,130,246,1)',borderWidth:1,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>fmtK(v),color:'#5a7090'},grid:{color:'rgba(255,255,255,.05)'}},x:{ticks:{color:'#5a7090'},grid:{color:'rgba(255,255,255,.05)'}}}}});
  },100);
}

function itemCardHTML(p) {
  const inCart = cart.find(c=>c.id===p.id);
  return `<div class="item-card" onclick="addToCart(${p.id})" id="ic-${p.id}">
    ${inCart?`<div class="qty-in-cart" style="display:flex">${inCart.qty}</div>`:''}
    <div class="ic-img">${p.image&&p.image.startsWith('http')?`<img src="${p.image}" onerror="this.outerHTML='${p.image||'🍽️'}'">`:p.image||'🍽️'}</div>
    <div class="ic-name">${p.name}</div>
    <div class="ic-price">${fmtVnd(p.price)}</div>
    <div class="ic-cat">${p.cat_name||''}</div>
    ${p.stock<=5?`<span class="tag amber stock-badge">${p.stock}</span>`:''}
  </div>`;
}

function filterPOSCat(catId, el) {
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  window._posActiveCat = catId;
  renderPOSGrid();
}

function filterPOSItems() { renderPOSGrid(); }

function renderPOSGrid() {
  const search = (document.getElementById('pos-search')||{}).value||'';
  const catId = window._posActiveCat||0;
  let items = window._posProducts||[];
  if(catId) items = items.filter(p=>p.category_id===catId);
  if(search) items = items.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.code.toLowerCase().includes(search.toLowerCase()));
  document.getElementById('pos-items-grid').innerHTML = items.map(p=>itemCardHTML(p)).join('');
}

function addToCart(pid) {
  const p = (window._posProducts||[]).find(x=>x.id===pid);
  if(!p) return;
  const ex = cart.find(x=>x.id===pid);
  if(ex) ex.qty++;
  else cart.push({...p,qty:1,note:''});
  renderCartUI();
  renderPOSGrid();
}

function changeQty(pid, d) {
  const ex = cart.find(x=>x.id===pid);
  if(!ex) return;
  ex.qty += d;
  if(ex.qty<=0) cart = cart.filter(x=>x.id!==pid);
  renderCartUI();
  renderPOSGrid();
}

function renderCartUI() {
  const list = document.getElementById('cart-items-list');
  if(!list) return;
  document.getElementById('cart-count').textContent = cart.reduce((s,c)=>s+c.qty,0);
  if(!cart.length) {
    list.innerHTML='<div class="empty-state"><div class="es-icon">🛒</div><p>Chọn món để thêm vào đơn</p></div>';
  } else {
    list.innerHTML = cart.map(c=>`
      <div class="cart-item">
        <span class="ci-icon">${c.image||'🍽️'}</span>
        <div class="ci-info">
          <div class="ci-name">${c.name}</div>
          <div class="ci-price">${fmtVnd(c.price)}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qbtn" onclick="changeQty(${c.id},-1)">−</button>
          <span class="qnum">${c.qty}</span>
          <button class="qbtn" onclick="changeQty(${c.id},1)">+</button>
        </div>
        <span class="ci-total">${fmtVnd(c.price*c.qty)}</span>
      </div>`).join('');
  }
  renderCartTotals();
}

function renderCartTotals() {
  const sub = cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc = parseFloat((document.getElementById('cart-disc')||{}).value||0);
  const tax = parseFloat((document.getElementById('cart-tax')||{}).value||0);
  const discAmt = sub*disc/100;
  const taxAmt = (sub-discAmt)*tax/100;
  const total = sub - discAmt + taxAmt;
  const set = (id,v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
  set('c-subtotal', fmtVnd(sub));
  set('c-discount', `- ${fmtVnd(discAmt)}`);
  set('c-tax', fmtVnd(taxAmt));
  set('c-total', fmtVnd(total));
}

function lookupCartCustomer() {
  const phone = document.getElementById('cart-phone').value.trim();
  if(!phone) return;
  const cust = query(`SELECT * FROM customers WHERE phone=?`,[phone])[0];
  if(cust) {
    currentCustomer = cust;
    document.getElementById('cart-cust-info').style.display='block';
    document.getElementById('cart-cust-name').textContent = cust.name;
    document.getElementById('cart-cust-pts').textContent = `⭐ ${cust.points} điểm tích lũy${cust.points>=10?' • Đủ điều kiện giảm giá 5%':''}`;
    if(cust.points>=10) { document.getElementById('cart-disc').value=5; renderCartTotals(); }
    toast(`Xin chào ${cust.name}!`,'info');
  } else toast('Không tìm thấy khách hàng','error');
}

function clearCart() { cart=[]; currentCustomer=null; renderCartUI(); const di=document.getElementById('cart-disc');if(di)di.value=0;const ci=document.getElementById('cart-cust-info');if(ci)ci.style.display='none'; }

function checkout(method) {
  if(!cart.length) { toast('Vui lòng thêm món vào đơn!','error'); return; }
  const sub = cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc = parseFloat((document.getElementById('cart-disc')||{}).value||0);
  const tax = parseFloat((document.getElementById('cart-tax')||{}).value||0);
  const note = (document.getElementById('cart-note')||{}).value||'';
  const discAmt = sub*disc/100;
  const taxAmt = (sub-discAmt)*tax/100;
  const total = sub - discAmt + taxAmt;
  const pts = Math.floor(total/10000);
  const seq = (query(`SELECT COUNT(*)+1 as n FROM orders`)[0]||{n:1}).n;
  const code = 'HD'+String(seq).padStart(6,'0');
  const custId = currentCustomer?currentCustomer.id:null;
  run(`INSERT INTO orders(order_code,customer_id,subtotal,discount_pct,discount_amt,tax_pct,tax_amt,total,points_earned,payment_method,status,note) VALUES (?,?,?,?,?,?,?,?,?,?,?,?)`,
    [code,custId,sub,disc,discAmt,tax,taxAmt,total,pts,method,'completed',note]);
  const oid = db.exec('SELECT last_insert_rowid() as id')[0].values[0][0];
  cart.forEach(c=>run(`INSERT INTO order_items(order_id,product_id,product_name,price,cost,qty,total) VALUES (?,?,?,?,?,?,?)`,
    [oid,c.id,c.name,c.price,c.cost||0,c.qty,c.price*c.qty]));
  if(custId) {
    run(`UPDATE customers SET points=points+?,total_spent=total_spent+?,visit_count=visit_count+1 WHERE id=?`,[pts,total,custId]);
    run(`UPDATE products SET stock=stock-? WHERE id=?`,[c.qty,c.id]); // reduce stock
  }
  cart.forEach(c=>run(`UPDATE products SET stock=MAX(0,stock-?) WHERE id=?`,[c.qty,c.id]));
  toast(`✅ Đơn ${code} — ${fmtVnd(total)} (${method==='cash'?'Tiền mặt':method==='card'?'Thẻ':'Chuyển khoản'})`,'success');
  showInvoiceModal(oid, code, total, method);
  cart=[]; currentCustomer=null;
  renderCartUI();
}

function printPreview() {
  if(!cart.length){toast('Đơn hàng trống','error');return;}
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=parseFloat((document.getElementById('cart-disc')||{}).value||0);
  const tax=parseFloat((document.getElementById('cart-tax')||{}).value||0);
  const discAmt=sub*disc/100; const taxAmt=(sub-discAmt)*tax/100; const total=sub-discAmt+taxAmt;
  const note=(document.getElementById('cart-note')||{}).value||'';
  const shop=getSetting('shop_name'); const addr=getSetting('shop_address'); const phone=getSetting('shop_phone');
  const now=new Date();
  let inv=buildInvoiceText({order_code:'PREVIEW',created_at:now.toISOString(),subtotal:sub,discount_pct:disc,discount_amt:discAmt,tax_pct:tax,tax_amt:taxAmt,total,payment_method:'—',note},
    cart.map(c=>({product_name:c.name,qty:c.qty,price:c.price,total:c.price*c.qty})),
    currentCustomer,shop,addr,phone);
  showModal(`<div class="modal-title">🖨️ Xem trước hóa đơn</div><div class="invoice-print">${inv}</div>
    <div class="modal-footer"><button class="btn primary" onclick="doPrint('${encodeURIComponent(inv)}')">In hóa đơn</button><button class="btn" onclick="closeModal()">Đóng</button></div>`);
}

function buildInvoiceText(order, items, cust, shop, addr, phone) {
  const now = new Date(order.created_at);
  const line = '─'.repeat(38);
  let s = `╔${'═'.repeat(36)}╗\n`;
  s += `║${center(shop,36)}║\n`;
  s += `║${center(addr.slice(0,34),36)}║\n`;
  s += `║${center('ĐT: '+phone,36)}║\n`;
  s += `╚${'═'.repeat(36)}╝\n\n`;
  s += `      HÓA ĐƠN BÁN HÀNG\n\n`;
  s += `Số HĐ : ${order.order_code}\n`;
  s += `Ngày  : ${now.toLocaleDateString('vi-VN')} ${now.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}\n`;
  s += `Khách : ${cust?cust.name:'Khách vãng lai'}\n`;
  if(cust) s += `SĐT   : ${cust.phone}\n`;
  s += `${line}\n`;
  s += `${'Món ăn'.padEnd(20)}SL ${'Giá'.padStart(8)}  ${'T.Tiền'.padStart(8)}\n`;
  s += `${line}\n`;
  items.forEach(it=>{
    const name = it.product_name.length>18?it.product_name.slice(0,18)+'…':it.product_name;
    s += `${name.padEnd(20)}${String(it.qty).padStart(2)} ${fmtK(it.price).padStart(8)}  ${fmtK(it.total).padStart(8)}\n`;
  });
  s += `${line}\n`;
  s += `${'Tạm tính:'.padEnd(28)}${fmtK(order.subtotal).padStart(10)}\n`;
  if(order.discount_pct>0) s += `${'Giảm giá ('+order.discount_pct+'%):'.padEnd(28)}${('-'+fmtK(order.discount_amt)).padStart(10)}\n`;
  if(order.tax_pct>0) s += `${'Thuế VAT ('+order.tax_pct+'%):'.padEnd(28)}${fmtK(order.tax_amt).padStart(10)}\n`;
  s += `${'━'.repeat(38)}\n`;
  s += `${'TỔNG CỘNG:'.padEnd(28)}${fmtK(order.total).padStart(10)}\n`;
  s += `${'━'.repeat(38)}\n`;
  if(order.note) s += `Ghi chú: ${order.note}\n`;
  if(cust) s += `\nĐiểm tích lũy: ${cust.points} điểm\n`;
  s += `\n    Cảm ơn quý khách! Hẹn gặp lại! 🙏`;
  return s;
}

function center(str,width) { const s=str.slice(0,width); const pad=Math.floor((width-s.length)/2); return ' '.repeat(pad)+s+' '.repeat(width-pad-s.length); }
function doPrint(enc) {
  const text = decodeURIComponent(enc);
  const w = window.open('','_blank','width=420,height=700');
  w.document.write(`<html><head><title>Hóa đơn</title><style>body{font-family:'Courier New',monospace;font-size:12px;white-space:pre;padding:16px;background:#fff;color:#000}</style></head><body>${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</body></html>`);
  w.document.close(); setTimeout(()=>w.print(),300);
}

        ${order.discount_pct>0?`<div class="cart-line" style="width:200px"><span class="cl-label">Giảm giá ${order.discount_pct}%</span><span class="cl-val" style="color:var(--green)">- ${fmtVnd(order.discount_amt)}</span></div>`:''}
        ${order.tax_pct>0?`<div class="cart-line" style="width:200px"><span class="cl-label">Thuế ${order.tax_pct}%</span><span class="cl-val">${fmtVnd(order.tax_amt)}</span></div>`:''}
        <div style="display:flex;justify-content:space-between;width:200px;font-weight:700;font-size:15px"><span>Tổng cộng</span><span style="color:var(--primary);font-family:var(--mono)">${fmtVnd(order.total)}</span></div>

function reprintOrder(oid) {
  const order=query(`SELECT * FROM orders WHERE id=?`,[oid])[0];
  const items=query(`SELECT * FROM order_items WHERE order_id=?`,[oid]);
  const cust=order.customer_id?query(`SELECT * FROM customers WHERE id=?`,[order.customer_id])[0]:null;
  const inv=buildInvoiceText(order,items,cust,getSetting('shop_name'),getSetting('shop_address'),getSetting('shop_phone'));
  doPrint(encodeURIComponent(inv));
}

function deleteOrder(oid, code, custId, pts, total){
  if(!confirm(`Xóa đơn hàng ${code}?
Hành động này sẽ hoàn điểm và không thể hoàn tác.`)) return;
  // Hoàn điểm khách hàng nếu có
  if(custId && pts>0){
    run(`UPDATE customers SET points=MAX(0,points-?),total_spent=MAX(0,total_spent-?),visit_count=MAX(0,visit_count-1) WHERE id=?`,[pts,total,custId]);
  }
  run(`DELETE FROM order_items WHERE order_id=?`,[oid]);
  run(`DELETE FROM orders WHERE id=?`,[oid]);
  toast(`Đã xóa đơn ${code}`,'success');
  if(currentPage==='orders') renderOrders();
  else if(currentPage==='dashboard') renderDashboard();
}

function renderInventory() {
  const search=(document.getElementById('inv-search')||{}).value||'';

  let where='WHERE p.is_active=1';const params=[];
  if(search){where+=` AND (p.name LIKE ? OR p.code LIKE ?)`;params.push(`%${search}%`,`%${search}%`);}
  const prods=query(`SELECT p.*,c.name as cat_name FROM products p LEFT JOIN categories c ON c.id=p.category_id ${where} ORDER BY p.stock ASC`,params);
  const filtered = filterStatus==='low'?prods.filter(p=>p.stock<=p.min_stock*2):filterStatus==='out'?prods.filter(p=>p.stock<=0):prods;

  const logPage=window._invLogPage||1;
  const logTotal=query(`SELECT COUNT(*) as n FROM inventory_log`)[0].n;
  const logPages=Math.ceil(logTotal/15);
  const logs=query(`SELECT il.*,p.name as prod_name FROM inventory_log il JOIN products p ON p.id=il.product_id ORDER BY il.id DESC LIMIT 15 OFFSET ${(logPage-1)*15}`);

  const totalStockVal=prods.reduce((s,p)=>s+p.stock*p.cost,0);
  const lowCount=prods.filter(p=>p.stock<=p.min_stock).length;

  document.getElementById('content-area').innerHTML=`

    <div class="stat-card blue"><div class="sc-icon">📦</div><div class="sc-label">Tổng sản phẩm</div><div class="sc-val">${prods.length}</div><div class="sc-sub" style="color:var(--text3)">Đang kinh doanh</div></div>

    <input type="text" id="inv-search" placeholder="🔍 Tìm sản phẩm..." onkeyup="renderInventory()" value="${search}" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;color:var(--text);font-family:var(--font);outline:none;flex:1;min-width:160px;max-width:280px">

    <button class="btn primary" onclick="showAddInventory()">+ Nhập/Xuất kho</button>
    <button class="btn" onclick="showSetStockAll()">✏️ Điều chỉnh hàng loạt</button>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="section-header"><h3>📦 Tồn kho hiện tại <span style="font-size:11px;color:var(--text3);font-weight:400">(${filtered.length} sản phẩm)</span></h3></div>
      <div class="table-wrap" style="max-height:420px;overflow-y:auto"><table>
        <thead><tr><th>Sản phẩm</th><th>Danh mục</th><th>Tồn</th><th>Tối thiểu</th><th>Trạng thái</th><th style="width:80px">Tác vụ</th></tr></thead>

            </div>
            <div><div class="name" style="font-size:12px">${p.name}</div><div style="font-size:10px;color:var(--text3)">${p.code}</div></div>
          </div></td>
          <td style="color:var(--text3);font-size:12px">${p.cat_name||'—'}</td>
          <td>
            <div style="display:flex;align-items:center;gap:6px">

        <thead><tr><th>Sản phẩm</th><th>Loại</th><th>SL</th><th>Ghi chú</th><th>Thời gian</th><th></th></tr></thead>
        <tbody>${logs.map(l=>`<tr>
          <td class="name" style="font-size:12px">${l.prod_name}</td>
          <td><span class="tag ${l.type==='import'?'green':'amber'}">${l.type==='import'?'Nhập':'Xuất'}</span></td>

          <td style="color:var(--text3);font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis">${l.note||'—'}</td>

      </table></div>
      ${logPages>1?`<div class="pagination">${Array.from({length:logPages},(_,i)=>`<button class="page-btn ${logPage===i+1?'active':''}" onclick="setInvLogPage(${i+1})">${i+1}</button>`).join('')}</div>`:''}
      `:'<div class="empty-state"><p>Chưa có nhật ký kho</p></div>'}
    </div>
  </div>`;
}

function setInvLogPage(p){window._invLogPage=p;renderInventory();}

function showAddInventory(){
  const prods=query(`SELECT * FROM products WHERE is_active=1 ORDER BY name`);
  modalForm('📦 Giao dịch kho',`
    <div class="form-row">
      <div class="form-group"><label>Sản phẩm *</label>
        <select id="f-prod" onchange="updateStockPreview()">${prods.map(p=>`<option value="${p.id}" data-stock="${p.stock}">${p.name} (tồn: ${p.stock})</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Loại giao dịch</label>
        <select id="f-type" onchange="updateStockPreview()">
          <option value="import">📥 Nhập kho (+)</option>
          <option value="export">📤 Xuất kho (-)</option>
          <option value="adjust">⚙️ Điều chỉnh (set)</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Số lượng *</label><input id="f-qty" type="number" placeholder="50" min="0" oninput="updateStockPreview()"></div>
      <div class="form-group"><label>Ghi chú</label><input id="f-note" placeholder="Lý do, nguồn hàng..."></div>
    </div>
    <div id="stock-preview" style="padding:10px;background:var(--bg4);border-radius:var(--radius);font-size:13px;color:var(--text2);text-align:center">
      Chọn sản phẩm và nhập số lượng để xem trước
    </div>`,
    ()=>{
      const pid=parseInt(v('f-prod'));const qty=parseInt(v('f-qty')||0);const type=v('f-type');
      if(!pid){toast('Chọn sản phẩm!','error');return false;}
      const prod=query(`SELECT stock FROM products WHERE id=?`,[pid])[0];
      if(type==='adjust'){
        if(isNaN(qty)||qty<0){toast('Nhập số lượng tồn kho mới!','error');return false;}
        const diff=qty-prod.stock;
        run(`UPDATE products SET stock=? WHERE id=?`,[qty,pid]);
        run(`INSERT INTO inventory_log(product_id,type,qty_change,note) VALUES(?,?,?,?)`,[pid,'adjust',diff,v('f-note')||`Điều chỉnh → ${qty}`]);
      } else {
        if(!qty||qty<=0){toast('Số lượng phải lớn hơn 0!','error');return false;}
        const change=type==='import'?qty:-qty;
        run(`UPDATE products SET stock=MAX(0,stock+?) WHERE id=?`,[change,pid]);
        run(`INSERT INTO inventory_log(product_id,type,qty_change,note) VALUES(?,?,?,?)`,[pid,type,change,v('f-note')]);
      }
      toast('Đã cập nhật kho!','success'); renderInventory();
    });
}

function updateStockPreview(){
  const sel=document.getElementById('f-prod');
  const type=(document.getElementById('f-type')||{}).value;
  const qty=parseInt((document.getElementById('f-qty')||{}).value)||0;
  const prev=document.getElementById('stock-preview');
  if(!sel||!prev) return;
  const currentStock=parseInt(sel.selectedOptions[0]?.dataset?.stock||0);
  let newStock=currentStock;
  if(type==='import') newStock=currentStock+qty;
  else if(type==='export') newStock=Math.max(0,currentStock-qty);
  else if(type==='adjust') newStock=qty;
  const color=newStock<=0?'var(--red)':newStock<5?'var(--amber)':'var(--green)';
  prev.innerHTML=`<div style="display:flex;justify-content:center;gap:20px;align-items:center">
    <div><div style="font-size:11px;color:var(--text3)">Tồn hiện tại</div><div style="font-size:18px;font-weight:700;font-family:var(--mono)">${currentStock}</div></div>
    <div style="font-size:20px;color:var(--text3)">→</div>
    <div><div style="font-size:11px;color:var(--text3)">Sau giao dịch</div><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:${color}">${newStock}</div></div>
  </div>`;
}

    <div class="form-row col1"><div class="form-group"><label>Ghi chú (tuỳ chọn)</label><input id="f-note" placeholder="Nguồn hàng, nhà cung cấp..."></div></div>`,

function editStockEntry(pid, name, currentStock, minStock){
  modalForm(`✏️ Điều chỉnh kho: ${name}`,`
    <div class="form-row col3">
      <div class="form-group"><label>Loại</label>
        <select id="f-type">
          <option value="import">📥 Nhập kho</option>
          <option value="export">📤 Xuất kho</option>
          <option value="adjust">⚙️ Đặt tồn kho</option>
        </select>
      </div>
      <div class="form-group"><label>Số lượng</label><input id="f-qty" type="number" placeholder="${currentStock}" min="0"></div>
      <div class="form-group"><label>Tồn tối thiểu</label><input id="f-minstk" type="number" value="${minStock}"></div>
    </div>
    <div class="form-row col1"><div class="form-group"><label>Ghi chú</label><input id="f-note" placeholder="Lý do điều chỉnh..."></div></div>
    <div style="padding:8px 10px;background:var(--bg4);border-radius:var(--radius);font-size:12px;color:var(--text3)">Tồn hiện tại: <strong style="color:var(--text)">${currentStock}</strong></div>`,
    ()=>{
      const type=v('f-type');const qty=parseInt(v('f-qty'));const ms=parseInt(v('f-minstk'))||minStock;
      // Update min_stock
      run(`UPDATE products SET min_stock=? WHERE id=?`,[ms,pid]);
      if(!isNaN(qty)&&qty>=0){
        const change=type==='adjust'?(qty-currentStock):type==='import'?qty:-qty;
        const newStock=type==='adjust'?qty:Math.max(0,currentStock+(type==='import'?qty:-qty));
        run(`UPDATE products SET stock=? WHERE id=?`,[Math.max(0,newStock),pid]);
        if(change!==0) run(`INSERT INTO inventory_log(product_id,type,qty_change,note) VALUES(?,?,?,?)`,[pid,type,change,v('f-note')||`Điều chỉnh`]);
      }
      toast('Đã cập nhật!','success'); renderInventory();
    });
}

function showSetStockAll(){
  const prods=query(`SELECT * FROM products WHERE is_active=1 ORDER BY name`);
  modalForm('✏️ Điều chỉnh tồn kho hàng loạt',`
    <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Nhập số tồn kho mới. Để trống = không thay đổi.</div>
    <div style="max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:6px">
      ${prods.map(p=>`<div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--bg3);border-radius:var(--radius)">
        <span style="flex:1;font-size:13px;font-weight:500">${p.name}</span>
        <span style="font-size:11px;color:var(--text3)">tồn: ${p.stock}</span>
        <input type="number" id="bulk-${p.id}" placeholder="${p.stock}" min="0" style="width:80px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;color:var(--text);font-family:var(--mono);text-align:center;outline:none">
      </div>`).join('')}
    </div>`,
    ()=>{
      let updated=0;
      prods.forEach(p=>{
        const el=document.getElementById(`bulk-${p.id}`);
        if(!el||el.value==='') return;
        const newQty=parseInt(el.value);
        if(isNaN(newQty)||newQty<0) return;
        const diff=newQty-p.stock;
        run(`UPDATE products SET stock=? WHERE id=?`,[newQty,p.id]);
        if(diff!==0) run(`INSERT INTO inventory_log(product_id,type,qty_change,note) VALUES(?,?,?,?)`,[p.id,'adjust',diff,'Điều chỉnh hàng loạt']);
        updated++;
      });
      toast(`Đã cập nhật ${updated} sản phẩm!`,'success'); renderInventory();
    },'wide');
}

function deleteInventoryLog(lid, pid, qtyChange){
  if(!confirm('Hoàn tác giao dịch kho này? Tồn kho sẽ được khôi phục.')) return;
  // Hoàn tác thay đổi tồn kho
  run(`UPDATE products SET stock=MAX(0,stock-?) WHERE id=?`,[qtyChange,pid]);
  run(`DELETE FROM inventory_log WHERE id=?`,[lid]);
  toast('Đã hoàn tác giao dịch kho','success'); renderInventory();
}

function clearInventoryLog(){
  if(!confirm('Xóa toàn bộ nhật ký kho? Tồn kho hiện tại không bị ảnh hưởng.')) return;
  run(`DELETE FROM inventory_log`);
  toast('Đã xóa nhật ký kho','success'); renderInventory();
}

// ===================== REPORTS =====================
function renderReports() {
  const mode=window._rptMode||(document.getElementById('rpt-mode')||{}).value||'day';
  const _rv=window._rptVals||{};const selDay=_rv['rpt-sel-day']||(document.getElementById('rpt-sel-day')||{}).value||new Date().toISOString().slice(0,10);
  const selMonth=_rv['rpt-sel-month']||(document.getElementById('rpt-sel-month')||{}).value||new Date().toISOString().slice(0,7);
  const selYear=_rv['rpt-sel-year']||(document.getElementById('rpt-sel-year')||{}).value||String(new Date().getFullYear()); window._rptMode=null; window._rptVals=null;

  let dateWhere, dateLabel, groupExpr, fmtLabel;
  if(mode==='day'){
    dateWhere=`date(created_at)='${selDay}'`;
    dateLabel=new Date(selDay).toLocaleDateString('vi-VN',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
    groupExpr=`strftime('%H',created_at)`;
    fmtLabel=h=>h+':00';
  } else if(mode==='month'){
    dateWhere=`strftime('%Y-%m',created_at)='${selMonth}'`;
    dateLabel='Tháng '+selMonth.slice(5)+'/'+selMonth.slice(0,4);
    groupExpr=`date(created_at)`;
    fmtLabel=d=>new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});
  } else {
    dateWhere=`strftime('%Y',created_at)='${selYear}'`;
    dateLabel='Năm '+selYear;
    groupExpr=`strftime('%Y-%m',created_at)`;
    fmtLabel=m=>{const[y,mo]=m.split('-');return `T${parseInt(mo)}/${y.slice(2)}`;};
  }

  const byPeriod=query(`SELECT ${groupExpr} as period,SUM(total) as rev,COUNT(*) as cnt FROM orders WHERE ${dateWhere} AND status='completed' GROUP BY period ORDER BY period`);
  const totalRev=byPeriod.reduce((s,r)=>s+(r.rev||0),0);
  const totalOrd=byPeriod.reduce((s,r)=>s+(r.cnt||0),0);
  const byMethod=query(`SELECT payment_method,COUNT(*) as cnt,SUM(total) as rev FROM orders WHERE ${dateWhere} AND status='completed' GROUP BY payment_method`);
  const topProd=query(`SELECT p.name,p.image,SUM(oi.qty) as sold,SUM(oi.total) as rev FROM order_items oi JOIN products p ON p.id=oi.product_id JOIN orders o ON o.id=oi.order_id WHERE ${dateWhere} AND o.status='completed' GROUP BY oi.product_id ORDER BY rev DESC LIMIT 8`);

  // Tính lợi nhuận gộp từ giá vốn
  const cogsPeriod=query(`SELECT COALESCE(SUM(oi.cost*oi.qty),0) as cogs FROM order_items oi JOIN orders o ON o.id=oi.order_id WHERE ${dateWhere} AND o.status='completed'`);
  const cogs=(cogsPeriod[0]||{cogs:0}).cogs||0;
  const grossProfit=totalRev-cogs;

  const expWhere = mode==='day'?`expense_date='${selDay}'`:mode==='month'?`strftime('%Y-%m',expense_date)='${selMonth}'`:`strftime('%Y',expense_date)='${selYear}'`;
  const expenses=query(`SELECT category,SUM(amount) as total FROM expenses WHERE ${expWhere} GROUP BY category`);
  const totalExp=expenses.reduce((s,e)=>s+(e.total||0),0);
  const netProfit=totalRev-totalExp;

  // Số liệu so sánh kỳ trước
  let prevWhere;
  if(mode==='day'){const d=new Date(selDay);d.setDate(d.getDate()-1);prevWhere=`date(created_at)='${d.toISOString().slice(0,10)}'`;}
  else if(mode==='month'){const[y,m]=selMonth.split('-');const d=new Date(parseInt(y),parseInt(m)-2,1);prevWhere=`strftime('%Y-%m',created_at)='${d.toISOString().slice(0,7)}'`;}
  else{prevWhere=`strftime('%Y',created_at)='${parseInt(selYear)-1}'`;}
  const prev=query(`SELECT COALESCE(SUM(total),0) as rev,COUNT(*) as cnt FROM orders WHERE ${prevWhere} AND status='completed'`)[0]||{rev:0,cnt:0};
  const revDiff=prev.rev>0?(((totalRev-prev.rev)/prev.rev)*100).toFixed(1):null;

  // Render chi tiết đơn hàng theo ngày (chỉ hiện ở mode day)
  const orderList = mode==='day' ? query(`SELECT o.*,COALESCE(c.name,'Khách lẻ') as cust_name FROM orders o LEFT JOIN customers c ON c.id=o.customer_id WHERE ${dateWhere} AND o.status='completed' ORDER BY o.id DESC LIMIT 30`) : [];

  document.getElementById('content-area').innerHTML=`
  <!-- Filter bar -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;background:var(--bg2);padding:12px;border-radius:var(--radius2);border:1px solid var(--border)">
    <div style="display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <button onclick="switchRptMode('day')" id="rbt-day" style="padding:7px 14px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font);transition:all .15s;background:${mode==='day'?'var(--primary)':'var(--bg3)'};color:${mode==='day'?'#fff':'var(--text2)'}">📅 Ngày</button>
      <button onclick="switchRptMode('month')" id="rbt-month" style="padding:7px 14px;border:none;border-left:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font);transition:all .15s;background:${mode==='month'?'var(--primary)':'var(--bg3)'};color:${mode==='month'?'#fff':'var(--text2)'}">📆 Tháng</button>
      <button onclick="switchRptMode('year')" id="rbt-year" style="padding:7px 14px;border:none;border-left:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:700;font-family:var(--font);transition:all .15s;background:${mode==='year'?'var(--primary)':'var(--bg3)'};color:${mode==='year'?'#fff':'var(--text2)'}">📊 Năm</button>
    </div>
    <div id="rpt-date-picker" style="display:flex;gap:8px;align-items:center">
      ${mode==='day'?`<input type="date" id="rpt-sel-day" value="${selDay}" onchange="renderReports()" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;color:var(--text);font-family:var(--font);outline:none">`:
        mode==='month'?`<input type="month" id="rpt-sel-month" value="${selMonth}" onchange="renderReports()" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;color:var(--text);font-family:var(--font);outline:none">`:
        `<select id="rpt-sel-year" onchange="renderReports()" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;color:var(--text);font-family:var(--font);outline:none">
          ${Array.from({length:5},(_,i)=>new Date().getFullYear()-i).map(y=>`<option value="${y}" ${y==selYear?'selected':''}>${y}</option>`).join('')}
        </select>`}
    </div>
    <input type="hidden" id="rpt-mode" value="${mode}">
    <span style="font-size:12px;color:var(--text3);margin-left:4px">📋 ${dateLabel}</span>
    ${revDiff!==null?`<span style="font-size:12px;font-weight:700;color:${revDiff>=0?'var(--green)':'var(--red)'};margin-left:auto">${revDiff>=0?'▲':'▼'} ${Math.abs(revDiff)}% so kỳ trước</span>`:''}
  </div>

  <!-- KPI -->
  <div class="grid-4" style="margin-bottom:16px">
    <div class="stat-card blue"><div class="sc-icon">💰</div><div class="sc-label">Doanh thu</div><div class="sc-val">${fmtK(totalRev)}</div><div class="sc-sub" style="color:var(--text3)">Kỳ trước: ${fmtK(prev.rev)}</div></div>
    <div class="stat-card green"><div class="sc-icon">📈</div><div class="sc-label">Lợi nhuận ròng</div><div class="sc-val">${fmtK(netProfit)}</div><div class="sc-sub" style="color:${netProfit>=0?'var(--green)':'var(--red)'}">Gộp: ${fmtK(grossProfit)}</div></div>
    <div class="stat-card amber"><div class="sc-icon">🧾</div><div class="sc-label">Số đơn hàng</div><div class="sc-val">${totalOrd}</div><div class="sc-sub" style="color:var(--text3)">TB/đơn: ${fmtK(totalOrd?totalRev/totalOrd:0)}</div></div>
    <div class="stat-card red"><div class="sc-icon">💸</div><div class="sc-label">Chi phí</div><div class="sc-val">${fmtK(totalExp)}</div><div class="sc-sub" style="color:var(--text3)">Giá vốn: ${fmtK(cogs)}</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="section-header"><h3>📈 Biểu đồ doanh thu — ${dateLabel}</h3></div>
      <div class="chart-wrap" style="height:220px"><canvas id="rptChart"></canvas></div>
    </div>
    <div class="card">
      <div class="section-header"><h3>💳 Phương thức thanh toán</h3></div>
      ${byMethod.length?`<div class="chart-wrap" style="height:220px"><canvas id="payChart"></canvas></div>`:'<div class="empty-state" style="padding:40px"><p>Không có dữ liệu</p></div>'}
    </div>
  </div>

  <div class="grid-2" style="margin-top:0">
    <div class="card">
      <div class="section-header"><h3>🏆 Top món bán chạy</h3></div>
      ${topProd.length?topProd.map((p,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:11px;font-weight:700;color:${['var(--amber)','var(--text2)','var(--text3)'][i]||'var(--text3)'};width:18px;text-align:center">#${i+1}</span>
          <span style="font-size:18px">${p.image&&!p.image.startsWith('http')&&p.image.length<=2?p.image:p.image?'':'🍽️'}${p.image&&(p.image.startsWith('data:')||p.image.startsWith('http'))?`<img src="${p.image}" style="width:28px;height:28px;border-radius:5px;object-fit:cover;vertical-align:middle">`:''}</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:500">${p.name}</div>
            <div class="progress-bar" style="margin-top:4px"><div class="progress-fill" style="width:${Math.min(100,p.sold/(topProd[0]?.sold||1)*100)}%;background:var(--primary)"></div></div>
          </div>
          <div style="text-align:right">
            <div style="font-size:12px;font-family:var(--mono);font-weight:700;color:var(--primary)">${fmtVnd(p.rev)}</div>
            <div style="font-size:11px;color:var(--text3)">${p.sold} bán</div>
          </div>
        </div>`).join(''):'<div class="empty-state"><p>Không có dữ liệu</p></div>'}
    </div>
    <div class="card">
      <div class="section-header"><h3>💸 Chi phí theo danh mục</h3></div>
      ${expenses.length?expenses.map(e=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;color:var(--text2)">${e.category}</span>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-weight:600;color:var(--red)">${fmtVnd(e.total)}</div>
          <div style="font-size:11px;color:var(--text3)">${totalExp>0?Math.round(e.total/totalExp*100):0}%</div>
        </div>
      </div>`).join(''):'<div class="empty-state"><p>Không có chi phí</p></div>'}
    </div>
  </div>

  ${mode==='day'&&orderList.length?`
  <div class="card" style="margin-top:0">
    <div class="section-header"><h3>🧾 Danh sách đơn hàng — ${dateLabel}</h3><span style="font-size:12px;color:var(--text3)">${orderList.length} đơn</span></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Mã đơn</th><th>Khách</th><th>Món</th><th>Tổng tiền</th><th>Thanh toán</th><th>Giờ</th><th></th></tr></thead>
      <tbody>${orderList.map(o=>`<tr onclick="showOrderDetail(${o.id})" style="cursor:pointer">
        <td><span class="name" style="font-family:var(--mono);font-size:12px">${o.order_code}</span></td>
        <td>${o.cust_name}</td>
        <td style="color:var(--text3);font-size:12px">${(query('SELECT COUNT(*) as n FROM order_items WHERE order_id='+o.id)[0]||{n:0}).n} món</td>
        <td style="font-family:var(--mono);color:var(--primary);font-weight:700">${fmtVnd(o.total)}</td>
        <td><span class="tag ${o.payment_method==='cash'?'green':o.payment_method==='card'?'blue':'purple'}">${o.payment_method==='cash'?'Tiền mặt':o.payment_method==='card'?'Thẻ':'CK'}</span></td>
        <td style="color:var(--text3);font-family:var(--mono)">${o.created_at.slice(11,16)}</td>
        <td><button class="btn sm danger" onclick="event.stopPropagation();deleteOrder(${o.id},'${o.order_code}',${o.customer_id||0},${o.points_earned||0},${o.total})">🗑️</button></td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`:''}`;

  // Vẽ chart sau khi DOM ready
  setTimeout(()=>{
    destroyCharts();
    const ctx1=document.getElementById('rptChart');
    if(ctx1&&byPeriod.length){
      const labels=byPeriod.map(r=>fmtLabel(r.period));
      const revData=byPeriod.map(r=>r.rev||0);
      const ordData=byPeriod.map(r=>(r.cnt||0)*Math.max(1,Math.round(totalRev/totalOrd||1)));
      window._chart1=new Chart(ctx1,{type:'bar',data:{labels,datasets:[
        {label:'Doanh thu',data:revData,backgroundColor:'rgba(59,130,246,.7)',borderColor:'#3b82f6',borderWidth:1,borderRadius:4,yAxisID:'y'},
        {label:'Số đơn',data:byPeriod.map(r=>r.cnt||0),type:'line',borderColor:'#22c55e',backgroundColor:'transparent',tension:0.4,pointRadius:3,yAxisID:'y2'}
      ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index'},plugins:{legend:{labels:{color:'#8fa3bc',font:{size:11}}}},scales:{y:{ticks:{callback:v=>fmtK(v),color:'#5a7090'},grid:{color:'rgba(255,255,255,.04)'},position:'left'},y2:{ticks:{color:'#22c55e',font:{size:10}},grid:{display:false},position:'right'},x:{ticks:{color:'#5a7090',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}}}}});
    }
    const ctx2=document.getElementById('payChart');
    if(ctx2&&byMethod.length){
      window._chart2=new Chart(ctx2,{type:'doughnut',data:{labels:byMethod.map(m=>m.payment_method==='cash'?'Tiền mặt':m.payment_method==='card'?'Thẻ':'Chuyển khoản'),datasets:[{data:byMethod.map(m=>m.rev),backgroundColor:['#22c55e','#3b82f6','#a855f7'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8fa3bc',font:{size:11},padding:12}}}}});
    }
  },100);
}

function destroyCharts(){
  if(window._chart1){try{window._chart1.destroy();}catch(e){}}
  if(window._chart2){try{window._chart2.destroy();}catch(e){}}
  window._chart1=null;window._chart2=null;
}

function switchRptMode(mode){

// ===================== EXPENSES =====================

  const exps=query(`SELECT * FROM expenses ORDER BY id DESC`);
  const total=exps.reduce((s,e)=>s+e.amount,0);
  const byMonth=query(`SELECT strftime('%Y-%m',expense_date) as mon,SUM(amount) as total FROM expenses GROUP BY mon ORDER BY mon DESC LIMIT 6`);
  document.getElementById('content-area').innerHTML=`
  <div class="grid-3" style="margin-bottom:14px">
    <div class="stat-card red"><div class="sc-icon">💸</div><div class="sc-label">Tổng chi phí</div><div class="sc-val">${fmtK(total)}</div></div>
    <div class="stat-card amber"><div class="sc-icon">📅</div><div class="sc-label">Chi phí tháng này</div><div class="sc-val">${fmtK((query(`SELECT COALESCE(SUM(amount),0) as t FROM expenses WHERE strftime('%Y-%m',expense_date)=strftime('%Y-%m','now')`)[0]||{t:0}).t)}</div></div>
    <div class="stat-card blue"><div class="sc-icon">📊</div><div class="sc-label">Số mục chi phí</div><div class="sc-val">${exps.length}</div></div>
  </div>
  <div class="card">
    <div class="section-header"><h3>📋 Danh sách chi phí</h3>
      <button class="btn primary sm" onclick="showAddExpense()">+ Thêm chi phí</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Tiêu đề</th><th>Danh mục</th><th>Số tiền</th><th>Ngày</th><th>Ghi chú</th><th></th></tr></thead>
      <tbody>${exps.map(e=>`<tr>
        <td class="name">${e.title}</td>
        <td><span class="tag amber">${e.category}</span></td>
        <td style="font-family:var(--mono);color:var(--red);font-weight:600">${fmtVnd(e.amount)}</td>
        <td style="color:var(--text3)">${e.expense_date}</td>
        <td style="color:var(--text3)">${e.note||'—'}</td>
        <td><button class="btn sm danger" onclick="deleteExpense(${e.id})">Xóa</button></td>
      </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function showAddExpense(){
  modalForm('➕ Thêm chi phí',`
    <div class="form-row col1"><div class="form-group"><label>Tiêu đề *</label><input id="f-title" placeholder="Mua nguyên liệu..."></div></div>
    <div class="form-row">
      <div class="form-group"><label>Danh mục</label><select id="f-cat"><option>Nguyên liệu</option><option>Cố định</option><option>Nhân công</option><option>Tiện ích</option><option>Khác</option></select></div>
      <div class="form-group"><label>Số tiền *</label><input id="f-amount" type="number" placeholder="500000"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Ngày</label><input id="f-date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="form-group"><label>Ghi chú</label><input id="f-note"></div>
    </div>`,
    ()=>{
      const title=v('f-title'),amount=parseFloat(v('f-amount'));
      if(!title||!amount){toast('Tiêu đề và số tiền là bắt buộc!','error');return false;}
      run(`INSERT INTO expenses(title,category,amount,expense_date,note) VALUES(?,?,?,?,?)`,
        [title,v('f-cat'),amount,v('f-date'),v('f-note')]);
      toast('Đã thêm chi phí!','success'); renderExpenses();
    });
}

function deleteExpense(id){
  if(!confirm('Xóa mục chi phí này?'))return;
  run(`DELETE FROM expenses WHERE id=?`,[id]);
  toast('Đã xóa','success'); renderExpenses();
}

function uploadQRCode(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const data=ev.target.result;
    const wrap=document.getElementById('qr-preview-wrap');
    if(wrap){wrap.innerHTML=`<img id="qr-preview-img" src="${data}" style="width:100%;height:100%;object-fit:contain">`;}
    window._pendingQR=data;
  };
  reader.readAsDataURL(file);
}

function saveQRSettings(){
  const url=v('qr-url-input');
  const img=window._pendingQR||url||'';
  run(`INSERT OR REPLACE INTO settings VALUES ('qr_code_img',?)`,[img]);
  run(`INSERT OR REPLACE INTO settings VALUES ('qr_bank_name',?)`,[v('qr-bank-name')]);
  run(`INSERT OR REPLACE INTO settings VALUES ('qr_account',?)`,[v('qr-account')]);
  window._pendingQR=null;
  toast('Đã lưu QR thanh toán!','success');
  renderSettings();
}

function clearQR(){
  run(`INSERT OR REPLACE INTO settings VALUES ('qr_code_img','')`);
  toast('Đã xóa QR','info');
  renderSettings();
}

async function exportDB(){
  await saveDBNow();
  const buf=db.export();
  const blob=new Blob([buf],{type:'application/x-sqlite3'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`pos_backup_${new Date().toISOString().slice(0,10)}.sqlite`;a.click();
  toast('Đã xuất file database!','success');
}

  if(!confirm('⚠️ XÓA TOÀN BỘ DỮ LIỆU? Hành động này không thể hoàn tác!'))return;

// ===================== DATABASE VIEWER =====================
function renderDatabase(){
  const tables=['categories','products','customers','orders','order_items','expenses','inventory_log','settings'];
  const sel=(document.getElementById('db-table')||{}).value||'orders';
  const cols=query(`PRAGMA table_info(${sel})`);
  const rows=query(`SELECT * FROM ${sel} ORDER BY rowid DESC LIMIT 50`);
  const counts=tables.map(t=>({t,n:(query(`SELECT COUNT(*) as n FROM ${t}`)[0]||{n:0}).n}));

  document.getElementById('content-area').innerHTML=`
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    ${counts.map(c=>`<button class="btn ${sel===c.t?'primary':''}" onclick="switchDBTable('${c.t}')">${c.t} <span style="font-family:var(--mono);font-size:11px;opacity:.7">(${c.n})</span></button>`).join('')}
    <input type="hidden" id="db-table" value="${sel}">
  </div>
  <div class="card">
    <div class="section-header">
      <h3 style="font-family:var(--mono)">SELECT * FROM ${sel} LIMIT 50</h3>
      <div style="display:flex;gap:8px">
        <button class="btn sm" onclick="exportTableCSV('${sel}')">Xuất CSV</button>
        <span style="font-size:12px;color:var(--text3);line-height:36px">${rows.length} dòng</span>
      </div>
    </div>
    <div class="table-wrap" style="max-height:400px;overflow:auto">
      <table>
        <thead><tr>${cols.map(c=>`<th>${c.name}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;font-family:${['id','price','total','amount','qty','stock','points'].some(k=>c.name.includes(k))?'var(--mono)':'inherit'}">${r[c.name]??'NULL'}</td>`).join('')}</tr>`).join('')||`<tr><td colspan="${cols.length}" style="text-align:center;padding:20px;color:var(--text3)">Bảng trống</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="section-header"><h3>🔍 SQL Query tùy chỉnh</h3></div>
    <textarea id="custom-sql" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px;color:var(--text);font-family:var(--mono);font-size:12px;height:80px;resize:vertical;outline:none;margin-bottom:8px" placeholder="SELECT * FROM orders WHERE total > 100000 ORDER BY id DESC LIMIT 10;">SELECT * FROM orders ORDER BY id DESC LIMIT 10;</textarea>
    <div style="display:flex;gap:8px">
      <button class="btn primary" onclick="runCustomSQL()">▶ Chạy truy vấn</button>
      <button class="btn" onclick="document.getElementById('sql-result').innerHTML=''">Xóa kết quả</button>
    </div>
    <div id="sql-result" style="margin-top:10px;overflow-x:auto"></div>
  </div>`;
}

function switchDBTable(t){document.getElementById('db-table').value=t;renderDatabase();}

function runCustomSQL(){
  const sql=(document.getElementById('custom-sql')||{}).value;
  if(!sql) return;
  try {
    const res=db.exec(sql);
    if(!res.length){document.getElementById('sql-result').innerHTML='<div style="color:var(--green);font-size:13px">✅ Truy vấn thực thi thành công (không có kết quả trả về)</div>';return;}
    const cols=res[0].columns;const rows=res[0].values;
    document.getElementById('sql-result').innerHTML=`<div class="table-wrap"><table>
      <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>`<tr>${r.map(cell=>`<td style="font-family:var(--mono);font-size:12px">${cell??'NULL'}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div><div style="font-size:12px;color:var(--text3);margin-top:6px">${rows.length} dòng kết quả</div>`;
    saveDB();
  } catch(e) {
    document.getElementById('sql-result').innerHTML=`<div style="color:var(--red);font-size:13px;font-family:var(--mono)">❌ Lỗi: ${e.message}</div>`;
  }
}

function exportTableCSV(table){
  const rows=query(`SELECT * FROM ${table}`);
  if(!rows.length){toast('Bảng trống','error');return;}
  const cols=Object.keys(rows[0]);
  const csv=[cols.join(','),...rows.map(r=>cols.map(c=>`"${(r[c]??'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${table}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast(`Đã xuất ${table}.csv`,'success');
}

// ── Theme ──
function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')!=='light';
  html.setAttribute('data-theme',isDark?'light':'dark');
  localStorage.setItem('vjp_theme',isDark?'light':'dark');
  updateThemeIcon(!isDark);
}
function updateThemeIcon(isDark){
  const sun=document.getElementById('theme-icon-sun');
  const moon=document.getElementById('theme-icon-moon');
  if(sun) sun.style.display=isDark?'block':'none';
  if(moon) moon.style.display=isDark?'none':'block';
}
function initTheme(){
  const saved=localStorage.getItem('vjp_theme')||'dark';
  document.documentElement.setAttribute('data-theme',saved);
  updateThemeIcon(saved==='dark');
}

// ── Mobile sidebar ──
function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('sidebar-overlay');
  const open=sb.classList.toggle('open');
  ov.classList.toggle('show',open);
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

function fmtVnd(n) { return new Intl.NumberFormat('vi-VN').format(Math.round(n||0))+'₫'; }
function fmtK(n) { if(Math.abs(n)>=1000000) return (n/1000000).toFixed(1)+'tr'; if(Math.abs(n)>=1000) return Math.round(n/1000)+'k'; return Math.round(n)+'₫'; }
function v(id) { const el=document.getElementById(id); return el?el.value:''; }
function getSetting(k) { return (query(`SELECT value FROM settings WHERE key=?`,[k])[0]||{value:''}).value; }

function toast(msg, type='info') {
  const tc=document.getElementById('toast-container');
  const t=document.createElement('div');
  const icons={success:'✅',error:'❌',info:'ℹ️'};
  t.className=`toast ${type}`;t.innerHTML=`${icons[type]||'•'} ${msg}`;
  tc.appendChild(t);
  setTimeout(()=>{t.style.animation='fadeOut .3s ease forwards';setTimeout(()=>t.remove(),300);},3500);
}

function showModal(html, size='') {
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal ${size}">${html}</div>
    </div>`;
}

function closeModal() { document.getElementById('modal-container').innerHTML=''; }

function modalForm(title, formHTML, onSave, size='') {
  showModal(`<div class="modal-title">${title}</div>${formHTML}
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Hủy</button>
      <button class="btn primary" onclick="if(window._modalSave()!==false)closeModal()">Lưu</button>
    </div>`,size);
  window._modalSave = onSave;
}

function exportData() {
  const sql=`-- POS Quán Ăn Sáng - Export SQL\n-- Date: ${new Date().toISOString()}\n\n` +
    ['categories','products','customers','orders','order_items','expenses'].map(t=>{
      const rows=query(`SELECT * FROM ${t}`);
      if(!rows.length) return `-- ${t}: empty\n`;
      const cols=Object.keys(rows[0]);
      return `-- Table: ${t}\n`+rows.map(r=>`INSERT INTO ${t}(${cols.join(',')}) VALUES (${cols.map(c=>r[c]===null?'NULL':typeof r[c]==='number'?r[c]:`'${String(r[c]).replace(/'/g,"''")}'`).join(',')});`).join('\n')+'\n\n';
    }).join('');
  const blob=new Blob([sql],{type:'text/sql'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`pos_export_${new Date().toISOString().slice(0,10)}.sql`;a.click();
  toast('Đã xuất file SQL!','success');
}
